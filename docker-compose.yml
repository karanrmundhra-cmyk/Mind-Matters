services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: personal_os
      POSTGRES_PASSWORD: personal_os
      POSTGRES_DB: personal_os
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U personal_os']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://personal_os:personal_os@db:5432/personal_os
      DIRECT_URL: postgresql://personal_os:personal_os@db:5432/personal_os
      # Add the remaining keys from .env.example as needed.
    ports:
      - '3000:3000'

volumes:
  pgdata:
